<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e2e8f0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #1e293b; }
        .login-wrap { max-width: 400px; width: 100%; }
        .tabs { display: flex; background: #cbd5e1; border-radius: 8px 8px 0 0; overflow: hidden; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: #64748b; transition: all 0.3s; }
        .tab-btn.active { background: white; color: #0284c7; }
        .login-box { background: white; padding: 30px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .login-form { display: none; }
        .login-form.active { display: block; animation: fadeEffect 0.5s; }
        @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-patient { background: #0284c7; }
        .btn-patient:hover { background: #0369a1; }
        .btn-doctor { background: #10b981; }
        .btn-doctor:hover { background: #059669; }
        .nav { margin-bottom: 20px; }
        .nav a { color: #0284c7; text-decoration: none; margin: 0 10px; font-weight: 500;}
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html">← Back to Home / Book</a>
        <a href="admin.html">View Admin Dashboard</a>
    </div>

    <div class="login-wrap">
        <div class="tabs">
            <div class="tab-btn active" onclick="switchLogin('patient')">Patient Login</div>
            <div class="tab-btn" onclick="switchLogin('doctor')">Staff / Doctor</div>
        </div>
        
        <div class="login-box">
            <!-- Patient Form -->
            <form id="patientForm" class="login-form active" onsubmit="handleLogin(event, 'Patient')">
                <h3 style="margin-top:0;">Patient Portal</h3>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required>
                </div>
                <button type="submit" class="btn-patient">Login to Patient Dashboard</button>
            </form>

            <!-- Doctor Form -->
            <form id="doctorForm" class="login-form" onsubmit="handleLogin(event, 'Doctor')">
                <h3 style="margin-top:0;">Practitioner Portal</h3>
                <div class="form-group">
                    <label>Medical ID / Username</label>
                    <input type="text" required placeholder="DOC-XXXX">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required>
                </div>
                <div class="form-group">
                    <label>Hospital Security PIN</label>
                    <input type="password" required maxlength="6">
                </div>
                <button type="submit" class="btn-doctor">Access Records</button>
            </form>
        </div>
    </div>

    <script>
        function switchLogin(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            const patientForm = document.getElementById('patientForm');
            const doctorForm = document.getElementById('doctorForm');

            if (type === 'patient') {
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                patientForm.classList.add('active');
                doctorForm.classList.remove('active');
            } else {
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
                doctorForm.classList.add('active');
                patientForm.classList.remove('active');
            }
        }

        function handleLogin(e, role) {
            e.preventDefault();
            alert(`Simulated API call.\n${role} login currently not connected to backend in this prototype.`);
        }
    </script>
</body>
</html>
